<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema Biblioteca - Teste PostgreSQL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div id="areaNav"></div>
    <header class="bg-light border-bottom py-5">
        <div class="container text-center">
            <h1 class="display-6 fw-bold">PostgreSQL Produtos Editar</h1>
            <p class="lead">
                Esta página verifica se o Node.js está conseguindo acessar o banco de dados.
            </p>
        </div>
    </header>
    <main class="container my-5">
    
        <div class="row justify-content-center">
            <div class="col-lg-7 col-md-9">
    
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-warning text-dark">
                        <strong>✏️ Editar Produto</strong>
                    </div>
    
                    <div class="card-body p-4">
    
                        <div id="mensagemProduto"></div>
    
                        <form id="formProdutoEditar">
    
                            <input type="hidden" id="idProduto">
    
                            <div class="mb-3">
                                <label for="nome" class="form-label">
                                    Nome do Produto <span class="text-danger">*</span>
                                </label>
                                <input type="text" class="form-control" id="nome" placeholder="Ex: Mouse USB" required>
                            </div>
    
                            <div class="row">
    
                                <div class="col-md-6 mb-3">
                                    <label for="preco" class="form-label">
                                        Preço <span class="text-danger">*</span>
                                    </label>
                                    <input type="number" class="form-control" id="preco" placeholder="Ex: 39.90" min="0"
                                        step="0.01" required>
                                </div>
    
                                <div class="col-md-6 mb-3">
                                    <label for="estoque" class="form-label">
                                        Estoque <span class="text-danger">*</span>
                                    </label>
                                    <input type="number" class="form-control" id="estoque" placeholder="Ex: 10" min="0"
                                        step="1" required>
                                </div>
    
                            </div>
    
                            <div class="mb-3">
                                <label for="categoria" class="form-label">
                                    Categoria <span class="text-danger">*</span>
                                </label>
    
                                <select class="form-select" id="categoria" required>
                                    <option value="">Selecione uma categoria</option>
                                    <option value="Computadores">Computadores</option>
                                    <option value="Mouse">Mouse</option>
                                    <option value="Memórias">Memórias</option>
                                    <option value="Móveis">Móveis</option>
                                    <option value="Monitores">Monitores</option>
                                    <option value="Celulares">Celulares</option>
                                </select>
                            </div>
    
                            <div class="d-flex gap-2 justify-content-between mt-4">
                                <a href="/produtos" class="btn btn-outline-secondary">
                                    ← Voltar para Produtos
                                </a>
    
                                <button type="submit" class="btn btn-warning">
                                    Atualizar Produto
                                </button>
                            </div>
    
                        </form>
    
                    </div>
                </div>
    
            </div>
        </div>
    
    </main>
    <footer class="bg-dark text-white text-center py-3">
        Sistema de Biblioteca com HTML, JavaScript, Node.js e PostgreSQL
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/carregar-componentes.js"></script>
    <script src="/assets/js/scriptProdutoEditar.js"></script>
</body>

</html>
