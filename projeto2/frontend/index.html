<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Sistema Biblioteca - Teste PostgreSQL</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">📚 Biblioteca Dev</a>
        </div>
    </nav>

    <header class="bg-light border-bottom py-5">
        <div class="container text-center">
            <h1 class="display-6 fw-bold">Teste de Conexão com PostgreSQL</h1>
            <p class="lead">
                Esta página verifica se o Node.js está conseguindo acessar o banco de dados.
            </p>
        </div>
    </header>

    <main class="container my-5">

        <section class="row justify-content-center">
            <div class="col-md-8 col-lg-6">

                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <strong>🔌 Verificação do Banco de Dados</strong>
                    </div>

                    <div class="card-body">
                        <p>
                            Clique no botão abaixo para testar a conexão com o PostgreSQL.
                        </p>

                        <button id="btnTestarConexao" class="btn btn-success">
                            Testar Conexão
                        </button>

                        <div id="resultado" class="mt-4"></div>
                    </div>
                </div>

            </div>
        </section>

    </main>

    <footer class="bg-dark text-white text-center py-3">
        Sistema de Biblioteca com HTML, JavaScript, Node.js e PostgreSQL
    </footer>

    <script src="assets/js/teste-conexao.js"></script>
</body>

</html>
